    // =========================================================
    // MATCHING LOGIC
    // =========================================================
    const STOP_WORDS = new Set(["the","a","an","of","in","on","at","to","and","or","is","my","i","it","s"]);
    function normalize(str) { return str.trim().toLowerCase().replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," "); }
    function stripArticles(str) { return str.replace(/^(the|a|an)\s+/i,"").trim(); }
    function sigWords(str) { return normalize(str).split(" ").filter(w => w.length > 2 && !STOP_WORDS.has(w)); }
    function levenshtein(a,b) {
      const m=a.length,n=b.length;
      const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
      for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
      return dp[m][n];
    }
    function fuzzyWordMatch(gw,mw) {
      if(gw===mw||gw.includes(mw)||mw.includes(gw)) return true;
      const maxDist=mw.length>=8?2:mw.length>=5?1:0;
      return levenshtein(gw,mw)<=maxDist;
    }
    function isCorrectGuess(guessStr,movie) {
      const g=normalize(guessStr),m=normalize(movie);
      if(g===m) return true;
      if(stripArticles(g)===stripArticles(m)) return true;
      if(m.includes(g)&&g.length>=4) return true;
      const gSig=sigWords(guessStr),mSig=sigWords(movie);
      if(gSig.length===0) return false;
      const allMatch=gSig.every(gw=>mSig.some(mw=>fuzzyWordMatch(gw,mw)));
      const coverage=mSig.filter(mw=>gSig.some(gw=>fuzzyWordMatch(gw,mw))).length;
      return allMatch&&coverage>=Math.max(1,mSig.length-1);
    }
    function getProximityFeedback(guessStr, movie) {
      const gSig=sigWords(guessStr), mSig=sigWords(movie);
      const g=normalize(guessStr), m=normalize(movie);
      if(g===m) return null;
      const shared=mSig.filter(mw=>gSig.some(gw=>fuzzyWordMatch(gw,mw)));
      if(shared.length>=2) return { level:"hot",  msg:"🔥 Very close — you've got part of the title!" };
      if(shared.length===1) return { level:"warm", msg:"🌡️ Warm — you're in the right ballpark." };
      const franchises=["star wars","harry potter","lord of the rings","avengers","spider-man","toy story","matrix","dark knight","jurassic","hunger games","terminator","back to the future"];
      const franchise=franchises.find(f=>{ const fw=f.split(" ")[0]; return m.includes(fw)&&g.includes(fw); });
      if(franchise) return { level:"warm", msg:"🌡️ Warm — right franchise, wrong film!" };
      return { level:"cold", msg:"❄️ Not quite — keep thinking!" };
    }

    // =========================================================
    // CONFETTI BURST
    // =========================================================
    function spawnConfettiBatch(cfg, count, distMin, distMax, durBase, delay = 0) {
      const colors = [cfg.orb1, cfg.orb2, "#FFD700", "#FF6B6B", "#60A5FA", "#A78BFA", "#34D399", "#F9A8D4"];
      for (let i = 0; i < count; i++) {
        const el = document.createElement("div");
        el.className = "confetti-piece";
        const size = 5 + Math.random() * 10;
        const angle = (Math.random() * 360) * (Math.PI / 180);
        const dist = distMin + Math.random() * (distMax - distMin);
        const dur = durBase + Math.random() * 0.6;
        el.style.cssText = `
          left: calc(50% + ${(Math.random()-0.5)*100}px);
          top: calc(38% + ${(Math.random()-0.5)*80}px);
          width: ${size}px; height: ${size}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          --tx: ${Math.cos(angle)*dist}px;
          --ty: ${Math.sin(angle)*dist - 60}px;
          --rot: ${Math.random() * 720}deg;
          --dur: ${dur}s;
          animation-delay: ${delay + Math.random() * 0.35}s;
          border-radius: ${Math.random() > 0.5 ? "50%" : "3px"};
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (delay + dur + 0.5) * 1000);
      }
    }

    function launchConfetti(cfg, level = "normal") {
      if (level === "mega") {
        // Wave 1 — immediate burst
        spawnConfettiBatch(cfg, 55, 140, 320, 1.3, 0);
        // Wave 2 — second bloom after 300ms
        setTimeout(() => spawnConfettiBatch(cfg, 40, 100, 260, 1.1, 0), 320);
        // Wave 3 — trailing shower
        setTimeout(() => spawnConfettiBatch(cfg, 25, 80, 200, 1.0, 0), 620);
        // Screen flash
        const flash = document.createElement("div");
        flash.className = "screen-flash";
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 900);
      } else {
        spawnConfettiBatch(cfg, 32, 110, 240, 1.2, 0);
      }
    }

    // =========================================================
    // STREAK MILESTONE CHECK
    // =========================================================
    function getMilestoneMessage(streak) {
      if (streak % 10 === 0) {
        const flames = streak >= 50 ? "🔥🔥🔥🔥🔥" : streak >= 30 ? "🔥🔥🔥🔥" : "🔥🔥🔥";
        return { text: `${streak} STREAK! ${flames}`, level: "mega" };
      }
      if (streak % 5 === 0) {
        return { text: `${streak} in a row! 🔥`, level: "hot" };
      }
      return null;
    }

    // =========================================================
    // SUBCOMPONENTS
    // =========================================================
    function Stars({ count }) {
      return (
        <span style={{ fontSize: 20, letterSpacing: 2 }}>
          {[1,2,3].map(i => (
            <span key={i} style={{ opacity: i <= count ? 1 : 0.18, filter: i <= count ? "none" : "grayscale(1)", transition: "all 0.3s" }}>⭐</span>
          ))}
        </span>
      );
    }

    function StreakToast({ toast }) {
      if (!toast) return null;
      return (
        <div key={toast.key} className={`streak-toast streak-toast-${toast.level}`}>
          {toast.text}
        </div>
      );
    }

    // =========================================================
    // MAIN COMPONENT
    // =========================================================
    function QuoteDashboard() {
      const [current, setCurrent]           = useState(() => getRandomQuote());
      const [guess, setGuess]               = useState("");
      const [guessHistory, setGuessHistory] = useState([]);
      const [revealed, setRevealed]         = useState(false);
      const [won, setWon]                   = useState(false);
      const [gaveUp, setGaveUp]             = useState(false);
      const [streak, setStreak]             = useState(0);
      const [hintUsed, setHintUsed]         = useState(false);
      const [showCopied, setShowCopied]     = useState(false);
      const [animKey, setAnimKey]           = useState(0);
      const [streakToast, setStreakToast]   = useState(null);
      const inputRef = useRef(null);

      // Set CSS custom property for genre-colored focus ring
      const cfg = GENRE_CONFIG[current.genre] || GENRE_CONFIG["Drama"];
      useEffect(() => {
        document.documentElement.style.setProperty("--genre-color", cfg.orb1 + "99");
        document.documentElement.style.setProperty("--genre-glow",  cfg.orb1 + "22");
      }, [cfg.orb1]);

      const MAX_GUESSES = 3;
      const guessCount  = guessHistory.length;
      const guessesLeft = MAX_GUESSES - guessCount;
      const starsEarned = won ? (guessCount === 1 ? 3 : guessCount === 2 ? 2 : 1) : 0;

      function triggerMilestone(newStreak) {
        const milestone = getMilestoneMessage(newStreak);
        if (!milestone) return;
        // Show toast (unique key forces re-mount / re-animation)
        setStreakToast({ ...milestone, key: Date.now() });
        const duration = milestone.level === "mega" ? 4200 : 2800;
        setTimeout(() => setStreakToast(null), duration);
        // Launch confetti after a short delay so the card has settled
        setTimeout(() => launchConfetti(cfg, milestone.level), 160);
      }

      function handleGuess() {
        if (!guess.trim() || revealed) return;
        const correct = isCorrectGuess(guess, current.movie);

        if (correct) {
          const newHistory = [...guessHistory, { text: guess, feedback: null, correct: true }];
          setGuessHistory(newHistory);
          setRevealed(true);
          setWon(true);
          setGuess("");
          setStreak(s => {
            const next = s + 1;
            triggerMilestone(next);
            return next;
          });
          // First-try confetti (only if not also a milestone — milestones fire their own)
          if (guessHistory.length === 0 && (streak + 1) % 5 !== 0) {
            setTimeout(() => launchConfetti(cfg, "normal"), 180);
          }
          return;
        }

        const feedback = getProximityFeedback(guess, current.movie);
        const newHistory = [...guessHistory, { text: guess, feedback, correct: false }];
        setGuessHistory(newHistory);
        setGuess("");

        if (newHistory.length >= MAX_GUESSES) {
          setRevealed(true);
          setWon(false);
          setStreak(0);
        }
        setTimeout(() => inputRef.current?.focus(), 50);
      }

      function handleGiveUp() {
        setRevealed(true); setWon(false); setGaveUp(true);
        setStreak(0);
      }

      function handleNext() {
        setCurrent(getRandomQuote());
        setGuess(""); setGuessHistory([]); setRevealed(false);
        setWon(false); setGaveUp(false); setHintUsed(false);
        setAnimKey(k => k + 1);
        setTimeout(() => inputRef.current?.focus(), 100);
      }

      function handleCopy() {
        const starStr = won ? ["⭐⭐⭐","⭐⭐","⭐"][guessCount - 1] : "💀";
        const text = `🎬 Movie Quote of the Day ${starStr}\n\n"${current.quote}"\n\nClue: ${current.genre} · ${current.year}\nAnswer: ${current.movie}\n\nPlay at: https://your-username.github.io/movie-quote-of-the-day`;
        navigator.clipboard.writeText(text);
        setShowCopied(true);
        setTimeout(() => setShowCopied(false), 2200);
      }

      // Guess dot indicators
      const GuessDots = () => (
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {[0,1,2].map(i => {
            const h = guessHistory[i];
            const color = !h ? "rgba(30,30,60,0.12)"
              : h.correct ? "#48C78E"
              : i === MAX_GUESSES - 1 || (revealed && !h.correct) ? "#FF6B6B"
              : h.feedback?.level === "hot"  ? "#FF8C00"
              : h.feedback?.level === "warm" ? "#F7C948"
              : "#aab";
            return (
              <div key={i} style={{
                width: 10, height: 10, borderRadius: "50%",
                background: color,
                border: "1.5px solid rgba(255,255,255,0.75)",
                boxShadow: h ? `0 0 7px ${color}99` : "none",
                transition: "all 0.3s ease",
              }} />
            );
          })}
        </div>
      );

      return (
        <>
          <style>{css}</style>
          <StreakToast toast={streakToast} />
          <div className="lg-root">
            {/* Ambient orbs */}
            <div className="orb orb-a" style={{ background: cfg.orb1 }} />
            <div className="orb orb-b" style={{ background: cfg.orb2 }} />
            <div className="orb orb-c" style={{ background: cfg.orb1 }} />

            <div style={{ width: "100%", maxWidth: 560, position: "relative", zIndex: 1 }}>

              {/* ── Header ── */}
              <div style={{ textAlign: "center", marginBottom: 32 }} className="fade-up">
                <p style={{ fontSize: 11, letterSpacing: 5, textTransform: "uppercase", color: "rgba(30,30,60,0.42)", marginBottom: 6, fontWeight: 500 }}>
                  🎬 Office Game
                </p>
                <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(26px,5vw,38px)", fontWeight: 700, color: "#1a1a2e", letterSpacing: -0.5, lineHeight: 1.1 }}>
                  Movie Quote of the Day
                </h1>
                {streak >= 2 && (
                  <p style={{ marginTop: 8, fontSize: 13, color: "rgba(30,30,60,0.45)", fontFamily: "'DM Sans', sans-serif" }}>
                    {streak} in a row {streak >= 10 ? "🔥🔥🔥" : streak >= 5 ? "🔥🔥" : "🔥"}
                  </p>
                )}
              </div>

              {/* ── Main card ── */}
              <div className="glass-panel fade-up-3" key={animKey} style={{ padding: "32px 32px 28px" }}>

                {/* Genre + year + dots row */}
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 28, flexWrap: "wrap" }}>
                  <div className="glass-pill" style={{ padding: "5px 14px", display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: cfg.orb1, boxShadow: `0 0 7px ${cfg.orb1}` }} />
                    <span style={{ fontSize: 12, fontWeight: 500, color: "#1a1a2e", letterSpacing: 0.4 }}>{cfg.label}</span>
                  </div>
                  <div className="glass-pill" style={{ padding: "5px 14px" }}>
                    <span style={{ fontSize: 12, fontWeight: 500, color: "#1a1a2e", letterSpacing: 1, fontFamily: "monospace" }}>{current.year}</span>
                  </div>
                  <div style={{ marginLeft: "auto" }}>
                    <GuessDots />
                  </div>
                </div>

                {/* Quote */}
                <blockquote className="quote-text" style={{
                  fontFamily: "'Playfair Display', serif",
                  fontSize: "clamp(17px, 2.8vw, 22px)",
                  fontStyle: "italic",
                  fontWeight: 400,
                  color: "#1a1a2e",
                  lineHeight: 1.75,
                  margin: 0,
                  paddingLeft: 20,
                  borderLeft: `3px solid ${cfg.orb1}`,
                }}>
                  "{current.quote}"
                </blockquote>

                <div className="divider" />

                {/* Guess history */}
                {guessHistory.length > 0 && (
                  <div style={{ marginBottom: 16, display: "flex", flexDirection: "column", gap: 7 }}>
                    {guessHistory.map((g, i) => (
                      <div key={i} className="guess-item" style={{
                        display: "flex", alignItems: "center", gap: 10,
                        padding: "8px 14px",
                        borderRadius: 11,
                        background: g.correct ? "rgba(72,199,142,0.10)" : "rgba(0,0,0,0.04)",
                        border: `1px solid ${g.correct ? "rgba(72,199,142,0.3)" : "rgba(0,0,0,0.07)"}`,
                      }}>
                        <span style={{ fontSize: 13, color: "rgba(30,30,60,0.45)", fontFamily: "monospace", minWidth: 16 }}>{i + 1}.</span>
                        <span style={{ fontSize: 13, fontWeight: 500, color: "#1a1a2e", flex: 1 }}>{g.text}</span>
                        {g.correct
                          ? <span style={{ fontSize: 12, color: "#48C78E", fontWeight: 600 }}>✓ Correct</span>
                          : g.feedback
                            ? <span style={{ fontSize: 12, color: "rgba(30,30,60,0.5)" }}>{g.feedback.msg}</span>
                            : <span style={{ fontSize: 12, color: "#FF6B6B" }}>✗</span>
                        }
                      </div>
                    ))}
                  </div>
                )}

                {/* Hint row */}
                {!revealed && (
                  <div className="hint-row" style={{ marginBottom: 14, minHeight: 26, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
                    <div>
                      {!hintUsed ? (
                        <button className="hint-btn" onClick={() => setHintUsed(true)}>💡 Reveal character</button>
                      ) : (
                        <span style={{ fontSize: 13, color: "rgba(30,30,60,0.55)", fontStyle: "italic", fontFamily: "'Playfair Display', serif" }}>
                          — {current.character}
                        </span>
                      )}
                    </div>
                    <button className="hint-btn" onClick={handleNext} style={{ marginLeft: 12, whiteSpace: "nowrap" }}>
                      🎲 Re-roll
                    </button>
                  </div>
                )}

                {/* Reveal panel */}
                {revealed && (
                  <div className="result-glass" style={{
                    background: won ? "rgba(72,199,142,0.12)" : "rgba(255,100,100,0.09)",
                    borderColor: won ? "rgba(72,199,142,0.35)" : "rgba(255,100,100,0.28)",
                    marginBottom: 20,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                      <div style={{ fontSize: 15, fontWeight: 700, color: "#1a1a2e" }}>
                        {gaveUp ? "😔 Better luck next time" : won ? "✓ Got it!" : "✗ Out of guesses"}
                      </div>
                      {won && <Stars count={starsEarned} />}
                    </div>
                    <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, color: "#1a1a2e", fontWeight: 700 }}>
                      {current.movie}
                    </div>
                    <div style={{ fontSize: 12, color: "rgba(30,30,60,0.5)", marginTop: 3, fontStyle: "italic" }}>
                      — {current.character}
                    </div>
                    {won && (
                      <div style={{ fontSize: 12, color: "rgba(30,30,60,0.45)", marginTop: 6 }}>
                        Guessed in {guessCount} {guessCount === 1 ? "try" : "tries"}
                        {guessCount === 1 && " 🎉"}
                      </div>
                    )}
                  </div>
                )}

                {/* Input / post-round row */}
                {!revealed ? (
                  <div style={{ display: "flex", gap: 10 }}>
                    <input
                      ref={inputRef}
                      className="glass-input"
                      type="text"
                      value={guess}
                      onChange={e => setGuess(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && handleGuess()}
                      placeholder={
                        guessesLeft === 3 ? "Name the movie… (Enter to guess)"
                        : `${guessesLeft} guess${guessesLeft !== 1 ? "es" : ""} remaining…`
                      }
                      autoFocus
                    />
                    <button
                      className="glass-btn glass-btn-primary"
                      onClick={handleGuess}
                      style={{ background: `linear-gradient(135deg, ${cfg.orb1}, ${cfg.orb2})`, whiteSpace: "nowrap", flexShrink: 0 }}
                    >
                      Guess
                    </button>
                  </div>
                ) : (
                  <div className="post-round-btns" style={{ display: "flex", gap: 10 }}>
                    <button className="glass-btn" onClick={handleNext} style={{ flex: 1, fontWeight: 600 }}>
                      Next Quote →
                    </button>
                    <button className="glass-btn" onClick={handleCopy} style={{ flexShrink: 0, minWidth: 100 }}>
                      {showCopied ? "✓ Copied!" : "📋 Share"}
                    </button>
                  </div>
                )}

                {/* Give up button */}
                {!revealed && guessHistory.length > 0 && (
                  <div style={{ textAlign: "center", marginTop: 12 }}>
                    <button className="hint-btn" onClick={handleGiveUp} style={{ color: "rgba(180,30,30,0.55)", borderColor: "rgba(180,30,30,0.2)" }}>
                      🏳️ Give up
                    </button>
                  </div>
                )}

              </div>

              {/* ── Footer ── */}
              <div style={{ textAlign: "center", marginTop: 20 }}>
                <p style={{ fontSize: 11, color: "rgba(30,30,60,0.32)", letterSpacing: 2, textTransform: "uppercase", margin: 0 }}>
                  {TOTAL_QUOTES} quotes · 3 guesses · ⭐⭐⭐ for first try
                </p>
              </div>

            </div>
          </div>
        </>
      );
    }

    // =========================================================
    // MOUNT
    // =========================================================
    ReactDOM.createRoot(document.getElementById("root")).render(<QuoteDashboard />);
  </script>
</body>
</html>
